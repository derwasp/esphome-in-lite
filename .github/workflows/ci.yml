name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate ESPHome config
        run: esphome config .ci/esphome_smoke.yaml

      - name: Run BLE harness self-test
        run: python tools/inlite_ble_harness.py selftest

      - name: Check wizard CLI
        run: python tools/inlite_config_wizard.py --help

      - name: Compile Python sources
        run: python -m compileall components tools
