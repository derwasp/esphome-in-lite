esphome:
  name: ci-inlite-smoke

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

external_components:
  - source:
      type: local
      path: ../components
    components: [inlite_hub]

esp32_ble:
  max_connections: 1

esp32_ble_tracker:
  id: inlite_ble_tracker_id

ble_client:
  - mac_address: "00:00:00:00:00:00"
    id: inlite_ble_id
    auto_connect: false

inlite_hub:
  - id: inlite_hub_main
    ble_client_id: inlite_ble_id
    esp32_ble_id: inlite_ble_tracker_id
    hub_id: 0x1234
    network_passphrase_hex: "74657374"
    debug_transport: true

button:
  - platform: inlite_hub
    inlite_hub_id: inlite_hub_main
    refresh_state:
      name: "In-lite Smoke Refresh State"
      entity_category: diagnostic
    reconnect:
      name: "In-lite Smoke Reconnect"
      entity_category: diagnostic
